<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Les Jeux Jeannettiques — Édition 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#e9e2d0; --paper:#f5f0e4; --ink:#241c14; --ink-soft:#5b4f3f;
    --wolf:#3a4a5a; --ember:#c25a2e; --gold:#c9a227; --silver:#9aa0a6; --bronze:#b07a4a;
    --line:#d6cbb2; --green:#3f7d4e;
    --shadow:0 6px 24px rgba(40,30,15,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Iowan Old Style','Palatino Linotype',Georgia,serif;
    background:radial-gradient(1200px 600px at 50% -10%, #efe8d8, transparent), var(--sand);
    color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  /* fond photo défilant en filigrane */
  #bgshow{position:fixed;inset:0;z-index:-2;overflow:hidden;
    display:grid;grid-template-columns:repeat(4,1fr);gap:0}
  #bgshow .tile{background-size:cover;background-position:center;min-height:0}
  @media (max-width:760px){#bgshow{grid-template-columns:repeat(3,1fr)}}
  @media (min-width:1400px){#bgshow{grid-template-columns:repeat(5,1fr)}}
  /* voile clair par-dessus pour la lisibilité */
  #bgveil{position:fixed;inset:0;z-index:-1;
    background:linear-gradient(180deg, rgba(233,226,208,.42), rgba(233,226,208,.52))}
  .wrap{max-width:840px;margin:0 auto;padding:22px 16px 90px}
  .logo{width:min(260px,62vw);height:auto;display:block;margin:0 auto 6px;
    filter:drop-shadow(0 3px 8px rgba(40,30,15,.18))}
  .title-orn{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.35em;
    font-size:13px;color:var(--ember);text-transform:uppercase;margin-bottom:10px}
  h1 .wolf{
    background:linear-gradient(180deg,#e8c65a 0%,var(--gold) 45%,#a9822c 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    color:var(--gold);filter:drop-shadow(0 2px 1px rgba(90,60,10,.35))}
  h1{position:relative;color:var(--ink)}
  h1::after{content:"";display:block;width:70px;height:4px;margin:16px auto 0;
    background:linear-gradient(90deg,transparent,var(--ember),transparent);border-radius:2px}
  header.top{text-align:center;padding:24px 22px 22px;
    background:rgba(245,240,228,.90);border:1px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);backdrop-filter:blur(3px);margin-top:6px}
  .eyebrow{font-family:'Oswald',sans-serif;letter-spacing:.28em;font-weight:500;
    text-transform:uppercase;font-size:12px;color:var(--ember);margin-bottom:6px}
  h1{font-family:'Anton',Impact,sans-serif;font-size:clamp(46px,11vw,72px);line-height:.9;
    font-weight:400;letter-spacing:1px;text-transform:uppercase}
  .wolf{color:var(--wolf)}
  .sub{color:var(--ink-soft);font-size:14px;margin-top:8px;font-style:italic}
  .tabs{display:flex;gap:8px;justify-content:center;margin:20px 0 6px}
  .tab{border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);
    padding:9px 16px;border-radius:999px;font:inherit;font-size:14px;cursor:pointer;transition:.15s}
  .tab.active{background:var(--wolf);color:#fff;border-color:var(--wolf);box-shadow:var(--shadow)}
  .card{background:rgba(245,240,228,.97);border:1px solid var(--line);border-radius:16px;
    padding:18px;margin-top:16px;box-shadow:var(--shadow);backdrop-filter:blur(2px)}
  .card h2{font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;
    letter-spacing:.03em;font-size:20px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:10px auto 4px;max-width:480px}
  .podcol{flex:1 1 0;max-width:150px;display:flex;flex-direction:column;align-items:stretch}
  .podium-base{max-width:480px;margin-left:auto;margin-right:auto}
  .step{width:100%;text-align:center;border-radius:12px 12px 0 0;
    padding:12px 6px 10px;color:var(--ink);position:relative;transition:height .5s cubic-bezier(.2,.8,.2,1);
    display:flex;flex-direction:column;justify-content:flex-end}
  .step .pod-drop{display:flex;flex-direction:column;align-items:center}
  .step .nm{font-weight:800;font-size:16px;line-height:1.1;margin:2px 0;overflow:hidden;
    text-overflow:ellipsis;max-width:100%;color:var(--ink);text-shadow:0 1px 2px rgba(255,255,255,.35)}
  .step .pts{font-family:'DejaVu Sans Mono',monospace;font-size:13px;font-weight:700;
    color:var(--ink);opacity:.85}
  .step .medal{font-size:30px;margin-bottom:2px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.25))}
  .s1{height:156px;background:linear-gradient(180deg,#f2d873,var(--gold))}
  .s2{height:120px;background:linear-gradient(180deg,#c8cdd3,var(--silver))}
  .s3{height:98px;background:linear-gradient(180deg,#d6a476,var(--bronze))}
  /* reflet lumineux qui balaie chaque marche */
  .step::after{content:"";position:absolute;inset:0;border-radius:12px 12px 0 0;
    background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);
    background-size:250% 100%;background-position:150% 0;pointer-events:none;
    animation:shine 3.2s ease-in-out infinite}
  .s2::after{animation-delay:.4s}.s3::after{animation-delay:.8s}
  @keyframes shine{0%,100%{background-position:150% 0}45%,55%{background-position:-50% 0}}
  /* les noms tombent du haut en rebondissant */
  .pod-drop{display:block;opacity:0;transform:translateY(-40px)}
  .pod-drop.play{animation:drop .6s cubic-bezier(.34,1.56,.64,1) forwards}
  .step.s1 .pod-drop{animation-delay:.15s}
  .step.s2 .pod-drop{animation-delay:.35s}
  .step.s3 .pod-drop{animation-delay:.55s}
