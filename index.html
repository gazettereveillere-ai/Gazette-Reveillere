<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Les Jeux Jeannettiques — Édition 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#e9e2d0; --paper:#f5f0e4; --ink:#241c14; --ink-soft:#5b4f3f;
    --wolf:#3a4a5a; --ember:#c25a2e; --gold:#c9a227; --silver:#9aa0a6; --bronze:#b07a4a;
    --line:#d6cbb2; --green:#3f7d4e;
    --shadow:0 6px 24px rgba(40,30,15,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Iowan Old Style','Palatino Linotype',Georgia,serif;
    background:radial-gradient(1200px 600px at 50% -10%, #efe8d8, transparent), var(--sand);
    color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  #bgshow{position:fixed;inset:0;z-index:-2;overflow:hidden;
    display:grid;grid-template-columns:repeat(4,1fr);gap:0}
  #bgshow .tile{background-size:cover;background-position:center;min-height:0}
  @media (max-width:760px){#bgshow{grid-template-columns:repeat(3,1fr)}}
  @media (min-width:1400px){#bgshow{grid-template-columns:repeat(5,1fr)}}
  #bgveil{position:fixed;inset:0;z-index:-1;
    background:linear-gradient(180deg, rgba(233,226,208,.42), rgba(233,226,208,.52))}
  .wrap{max-width:840px;margin:0 auto;padding:22px 16px 90px}
  .logo{width:min(260px,62vw);height:auto;display:block;margin:0 auto 6px;
    filter:drop-shadow(0 3px 8px rgba(40,30,15,.18))}
  .title-orn{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.35em;
    font-size:13px;color:var(--ember);text-transform:uppercase;margin-bottom:10px}
  h1 .wolf{
    background:linear-gradient(180deg,#e8c65a 0%,var(--gold) 45%,#a9822c 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    color:var(--gold);filter:drop-shadow(0 2px 1px rgba(90,60,10,.35))}
  h1{position:relative;color:var(--ink)}
  h1::after{content:"";display:block;width:70px;height:4px;margin:16px auto 0;
    background:linear-gradient(90deg,transparent,var(--ember),transparent);border-radius:2px}
  header.top{text-align:center;padding:24px 22px 22px;
    background:rgba(245,240,228,.90);border:1px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);backdrop-filter:blur(3px);margin-top:6px}
  .eyebrow{font-family:'Oswald',sans-serif;letter-spacing:.28em;font-weight:500;
    text-transform:uppercase;font-size:12px;color:var(--ember);margin-bottom:6px}
  h1{font-family:'Anton',Impact,sans-serif;font-size:clamp(46px,11vw,72px);line-height:.9;
    font-weight:400;letter-spacing:1px;text-transform:uppercase}
  .wolf{color:var(--wolf)}
  .sub{color:var(--ink-soft);font-size:14px;margin-top:8px;font-style:italic}
  .tabs{display:flex;gap:8px;justify-content:center;margin:20px 0 6px}
  .tab{border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);
    padding:9px 16px;border-radius:999px;font:inherit;font-size:14px;cursor:pointer;transition:.15s}
  .tab.active{background:var(--wolf);color:#fff;border-color:var(--wolf);box-shadow:var(--shadow)}
  .card{background:rgba(245,240,228,.97);border:1px solid var(--line);border-radius:16px;
    padding:18px;margin-top:16px;box-shadow:var(--shadow);backdrop-filter:blur(2px)}
  .card h2{font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;
    letter-spacing:.03em;font-size:20px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:10px auto 4px;max-width:480px}
  .podcol{flex:1 1 0;max-width:150px;display:flex;flex-direction:column;align-items:stretch}
  .podium-base{max-width:480px;margin-left:auto;margin-right:auto}
  .step{width:100%;text-align:center;border-radius:12px 12px 0 0;
    padding:12px 6px 10px;color:var(--ink);position:relative;transition:height .5s cubic-bezier(.2,.8,.2,1);
    display:flex;flex-direction:column;justify-content:flex-end}
  .step .pod-drop{display:flex;flex-direction:column;align-items:center}
  .step .nm{font-weight:800;font-size:16px;line-height:1.1;margin:2px 0;overflow:hidden;
    text-overflow:ellipsis;max-width:100%;color:var(--ink);text-shadow:0 1px 2px rgba(255,255,255,.35)}
  .step .pts{font-family:'DejaVu Sans Mono',monospace;font-size:13px;font-weight:700;
    color:var(--ink);opacity:.85}
  .step .medal{font-size:30px;margin-bottom:2px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.25))}
  .s1{height:156px;background:linear-gradient(180deg,#f2d873,var(--gold))}
  .s2{height:120px;background:linear-gradient(180deg,#c8cdd3,var(--silver))}
  .s3{height:98px;background:linear-gradient(180deg,#d6a476,var(--bronze))}
  .step::after{content:"";position:absolute;inset:0;border-radius:12px 12px 0 0;
    background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);
    background-size:250% 100%;background-position:150% 0;pointer-events:none;
    animation:shine 3.2s ease-in-out infinite}
  .s2::after{animation-delay:.4s}.s3::after{animation-delay:.8s}
  @keyframes shine{0%,100%{background-position:150% 0}45%,55%{background-position:-50% 0}}
  .pod-drop{display:block;opacity:0;transform:translateY(-40px)}
  .pod-drop.play{animation:drop .6s cubic-bezier(.34,1.56,.64,1) forwards}
  .step.s1 .pod-drop{animation-delay:.15s}
  .step.s2 .pod-drop{animation-delay:.35s}
  .step.s3 .pod-drop{animation-delay:.55s}
  @keyframes drop{0%{opacity:0;transform:translateY(-40px)}60%{opacity:1;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}
  .step .rk{display:none}
  .podseg{height:12px;background:linear-gradient(180deg,#2e251a,var(--ink));
    margin:0 -5px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
  .podcol:first-child .podseg{border-radius:0 0 0 8px;margin-left:0}
  .podcol:last-child .podseg{border-radius:0 0 8px 0;margin-right:0}
  .plabel{width:100%;text-align:center;font-family:'Anton',Impact,sans-serif;
    font-size:30px;line-height:1;letter-spacing:.5px;margin-top:14px;margin-bottom:6px}
  .s1-lab{color:var(--gold)}.s2-lab{color:var(--silver)}.s3-lab{color:var(--bronze)}
  .podium-base{height:12px;background:linear-gradient(180deg,#2e251a,var(--ink));
    border-radius:0 0 8px 8px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
  @media(prefers-reduced-motion:reduce){.pod-drop,.pod-drop.play{animation:none;opacity:1;transform:none}.step::after{animation:none}}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:9px 8px;text-align:left;border-bottom:1px solid var(--line)}
  th{font-family:'DejaVu Sans Mono',monospace;font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-soft)}
  td.rank{font-weight:800;width:34px;color:var(--wolf)}
  td.total{font-weight:800;text-align:right;font-family:'DejaVu Sans Mono',monospace}
  td.pt{text-align:center;font-family:'DejaVu Sans Mono',monospace;color:var(--ink-soft)}
  th.stick,td.stick{position:sticky;background:rgba(245,240,228,.98);z-index:2}
  th.stick-rank,td.stick-rank{left:0}
  th.stick-name,td.stick-name{left:34px;box-shadow:2px 0 5px -2px rgba(40,30,15,.18);
    min-width:150px;white-space:nowrap}
  tr.top1 td.rank{color:var(--gold)}
  tr.top2 td.rank{color:var(--silver)}
  tr.top3 td.rank{color:var(--bronze)}
  .mv{display:inline-block;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;
    margin-left:4px;letter-spacing:0;vertical-align:1px}
  .mv.up{color:var(--green)}
  .mv.down{color:var(--ember)}
  @keyframes rowflash{
    0%{background:rgba(201,162,39,.55)}
    100%{background:transparent}
  }
  tr.flash td{animation:rowflash 3s ease-out forwards}
  tr.flash td.stick{animation:none;background:rgba(240,222,160,.95)}
  .sound-btn{font:inherit;font-size:13px;padding:5px 12px;border-radius:999px;
    border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);
    cursor:pointer;transition:.15s;margin-left:auto}
  .sound-btn.on{background:var(--green);border-color:var(--green);color:#fff}
  .scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .ephead{text-align:center;min-width:96px;vertical-align:bottom}
  .ephead .epemo{display:block;font-size:20px;line-height:1.4;margin-bottom:2px}
  .ephead .epname{display:block;font-family:'Oswald',sans-serif;font-weight:500;
    font-size:11px;letter-spacing:.02em;color:var(--ink-soft);text-transform:none;
    line-height:1.15;white-space:normal}
  .scroll-wrap{position:relative}
  .scroll-hint{text-align:right;font-family:'Oswald',sans-serif;font-size:13px;
    text-transform:uppercase;letter-spacing:.08em;color:var(--ember);
    margin-top:8px;animation:hintpulse 1.8s ease-in-out infinite}
  @keyframes hintpulse{0%,100%{opacity:.5;transform:translateX(0)}50%{opacity:1;transform:translateX(4px)}}
  .scroll-hint.gone{display:none}
  input,select{font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);width:100%}
  input:focus,select:focus{outline:2px solid var(--wolf);outline-offset:1px}
  .btn{font:inherit;font-size:14px;padding:9px 15px;border-radius:10px;border:1px solid var(--wolf);
    background:var(--wolf);color:#fff;cursor:pointer;transition:.15s;white-space:nowrap}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;color:var(--wolf)}
  .btn.danger{background:var(--ember);border-color:var(--ember)}
  .btn.sm{padding:6px 10px;font-size:13px}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
  .grid-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;
    padding:8px 0;border-bottom:1px solid var(--line)}
  .muted{color:var(--ink-soft);font-size:13px}
  .pill{display:inline-block;background:var(--sand);border:1px solid var(--line);
    border-radius:999px;padding:2px 10px;font-size:12px;font-family:'DejaVu Sans Mono',monospace}
  .hide{display:none!important}
  .lock{max-width:340px;margin:40px auto;text-align:center}
  .lock h2{justify-content:center}
  .foot{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:26px;font-style:italic}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .place-in{width:70px;text-align:center;font-family:'DejaVu Sans Mono',monospace}
  .score-in{width:64px;text-align:center;font-family:'DejaVu Sans Mono',monospace;padding:7px 6px}
  .maxhint{font-size:12px;color:var(--ink-soft);margin-left:6px}
  #scoreGridFull table{font-size:13px}
  #scoreGridFull th,#scoreGridFull td{padding:6px 6px;text-align:center;border:1px solid var(--line)}
  #scoreGridFull th.stick,#scoreGridFull td.stick{position:sticky;left:0;z-index:2;
    background:rgba(245,240,228,.98);text-align:left;box-shadow:2px 0 5px -2px rgba(40,30,15,.18);min-width:150px;white-space:nowrap}
  #scoreGridFull thead th{font-family:'Oswald',sans-serif;font-weight:500;font-size:11px;
    color:var(--ink-soft);text-transform:none;vertical-align:bottom;min-width:76px}
  #scoreGridFull thead th .emo{display:block;font-size:16px}
  #scoreGridFull td.tot{font-weight:800;font-family:'DejaVu Sans Mono',monospace;color:var(--wolf);
    background:var(--sand);position:sticky;right:0}
  #scoreGridFull th.tot{position:sticky;right:0;background:var(--sand)}
  #scoreGridFull input{width:56px;text-align:center;font-family:'DejaVu Sans Mono',monospace;padding:5px 4px;border-radius:8px}
  .ptbadge{min-width:44px;text-align:right;font-family:'DejaVu Sans Mono',monospace;font-weight:700;color:var(--wolf)}
  .medalmini{margin-left:4px}
  .info{background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--ink-soft);margin-bottom:12px}
  /* bandeau d'erreur d'enregistrement */
  .errbar{background:var(--ember);color:#fff;border-radius:10px;padding:10px 12px;
    font-size:13px;margin-bottom:12px;line-height:1.4}
  .errbar b{font-weight:700}
  .tab-mobile{display:none}
  @media (max-width:760px){.tab-mobile{display:inline-block}}
  .reg-list{margin:0 0 0 22px;padding:0}
  .reg-list li{padding:5px 0;border-bottom:1px solid var(--line);font-size:15px}
  .reg-list li:last-child{border-bottom:none}
  .reg-p{font-size:15px;line-height:1.5;margin-bottom:10px}
  .reg-bul{margin:0 0 4px 20px;padding:0}
  .reg-bul li{padding:5px 0;font-size:15px;line-height:1.45}
  .reg-ex{background:var(--sand);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;margin:12px 0;font-family:'DejaVu Sans Mono',monospace;
    font-size:13px;line-height:1.6;color:var(--ink)}
  .reg-ex-t{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.08em;
    font-size:12px;color:var(--ember);margin-bottom:4px}
  @media (max-width:560px){.step .nm{font-size:13px}}

  /* ===== GRAND ÉCRAN / TÉLÉ ===== */
  @media (min-width:1100px){
    .wrap{max-width:1400px;padding:34px 40px 60px}
    .logo{width:min(360px,32vw)}
    .eyebrow{font-size:16px;letter-spacing:.32em}
    h1{font-size:clamp(64px,6vw,92px)}
    .sub{font-size:22px;margin-top:12px}
    .tabs{margin:26px 0 10px}
    .tab{font-size:19px;padding:12px 26px}
    .card{padding:28px 32px;border-radius:22px;margin-top:24px}
    .card h2{font-size:32px;margin-bottom:20px}
    .podium{gap:22px;margin:20px auto 6px;max-width:960px}
    .podcol{max-width:300px}
    .podseg{height:18px;margin:0 -11px}
    .step{padding:22px 14px 18px;border-radius:18px 18px 0 0}
    .step .medal{font-size:52px}
    .step .nm{font-size:30px}
    .step .pts{font-size:24px}
    .plabel{font-size:56px;margin-top:26px}
    .s1{height:280px}.s2{height:210px}.s3{height:168px}
    table{font-size:26px}
    th{font-size:15px}
    th,td{padding:16px 14px}
    td.rank{width:60px;font-size:30px}
    th.stick-name,td.stick-name{left:60px;min-width:280px}
    .mv{font-size:18px;margin-left:6px}
    .sound-btn{font-size:18px;padding:8px 18px}
    .foot{font-size:16px}
  }
  @media (min-width:1600px){
    h1{font-size:110px}
    table{font-size:30px}
    .step .nm{font-size:36px}
    .step .medal{font-size:64px}
    .s1{height:330px}.s2{height:250px}.s3{height:200px}
  }
</style>
</head>
<body>
<div id="bgshow"></div>
<div id="bgveil"></div>
<div class="wrap">
  <header class="top">
    <h1>Les Jeux<br><span class="wolf">Jeannettiques</span></h1>
    <div class="title-orn" style="margin-top:14px;margin-bottom:0">✦ ÉDITION 2026 ✦</div>
    <div class="eyebrow" style="margin-top:10px;margin-bottom:0">Le grand tournoi du méchoui familial</div>
    <div class="sub">Classement en direct — chacun pour soi</div>
  </header>

  <div class="tabs">
    <button class="tab active" id="tabPublic">🏆 Classement</button>
    <button class="tab" id="tabAdmin">🔧 Saisie</button>
    <button class="tab tab-mobile" id="tabRegles">📖 Règles</button>
  </div>

  <!-- ============ PUBLIC ============ -->
  <section id="viewPublic">
    <div class="card">
      <h2><span class="live-dot"></span>Podium</h2>
      <div class="podium" id="podium"></div>
    </div>
    <div class="card">
      <h2>Classement général
        <button class="sound-btn" id="soundBtn" title="Activer le son">🔇 Son coupé</button>
      </h2>
      <div class="scroll-wrap">
        <div class="scroll-x" id="rankScroll"><table id="rankTable"><thead></thead><tbody></tbody></table></div>
        <div class="scroll-hint" id="scrollHint">glisse pour voir les épreuves →</div>
      </div>
      <p class="muted" id="emptyPublic" style="margin-top:8px"></p>
    </div>
  </section>

  <!-- ============ ADMIN ============ -->
  <section id="viewAdmin" class="hide">
    <div class="card lock" id="lockCard">
      <h2>🔒 Accès saisie</h2>
      <p class="muted" style="margin-bottom:12px">Réservé à l'organisateur.</p>
      <div class="row"><input type="password" id="adminPass" placeholder="Code admin" autocomplete="off"></div>
      <button class="btn" id="loginBtn" style="width:100%">Déverrouiller</button>
      <p class="muted" id="lockMsg" style="margin-top:8px;color:var(--ember)"></p>
    </div>

    <div id="adminPanel" class="hide">
      <div class="card">
        <h2>👥 Participants</h2>
        <div class="row">
          <input id="newPart" placeholder="Nom du participant" autocomplete="off">
          <button class="btn" id="addPart">Ajouter</button>
        </div>
        <div id="partList"></div>
      </div>

      <div class="card">
        <h2>🎯
